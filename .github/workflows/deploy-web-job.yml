name: "📦 Vercel App Deployment"
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
on:
  workflow_call:

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v4
      # - name: generate endpoints with orval
      #   run: npx orval
      - name: install Vercel CLI
        run: npm install --global vercel@latest
      - name: set working directory
        run: vercel --cwd ./web
      - name: pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_ACCESS_TOKEN }}
      - name: build Project Artifacts
        run: vercel /web build --prod --token=${{ secrets.VERCEL_ACCESS_TOKEN }}
      - name: deploy Project Artifacts to Vercel
        run: vercel /web deploy --prebuilt --prod --token=${{ secrets.VERCEL_ACCESS_TOKEN }}

      
